[project]
name = "tracklink"
version = "0.1.0"
description = "Tracking module to link masks generated by segmentation of mainly cells from living tissue"
readme = "README.md"
authors = [
    { name = "Benoit Roux", email = "benoit.roux@gmail.com" }
]
requires-python = ">=3.12, <3.13"
dependencies = [
    "trackastra[etultra]>=0.5.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
